# -*- coding: utf-8 -*-
"""
时间脚本（纯净版）
适用于：定时任务 / 北京时间校准 / 时间显示
"""

import time
from datetime import datetime, timedelta

# --------------------------
# 获取当前北京时间（UTC+8）
# --------------------------
def get_beijing_time():
    utc_now = datetime.utcnow()
    beijing = utc_now + timedelta(hours=8)
    return beijing

# --------------------------
# 打印格式化时间
# --------------------------
def print_time():
    now = get_beijing_time()
    print("=================================")
    print(f"📅 当前日期: {now.strftime('%Y-%m-%d')}")
    print(f"🕒 当前时间: {now.strftime('%H:%M:%S')}")
    print(f"🌏 时区: 北京时间（UTC+8）")
    print("=================================\n")

# --------------------------
# 定时任务示例（每天早上 8:00 提醒）
# --------------------------
def wait_8am():
    while True:
        now = get_beijing_time()
        target = now.replace(hour=8, minute=0, second=0, microsecond=0)
        if now > target:
            target += timedelta(days=1)
        
        delta = target - now
        print(f"⏳ 下次提醒: {target.strftime('%Y-%m-%d %H:%M')}")
        print(f"剩余时间: {str(delta).split('.')[0]}\n")
        
        time.sleep(60) # 每分钟检查一次

# --------------------------
# 主函数（可根据需要选择执行）
# --------------------------
if __name__ == "__main__":
    print_time()
    
