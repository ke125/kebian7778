name: 扫描币安U本位合约

# 定时执行规则：
# 采用 UTC 时间（比北京时间晚8小时）
# 每小时第5分钟执行一次，对应北京时间每小时05分
on:
  schedule:
    - cron: '5 * * * *'  # 每小时执行一次（UTC 时间 xx:05）
  workflow_dispatch:     # 保留手动触发功能

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas matplotlib

      - name: 运行扫描脚本
        run: python scan_binance_4h_final.py

      - name: 上传图表文件
        uses: actions/upload-artifact@v4
        with:
          name: k线图表
          path: match_*.png  # 上传匹配到的币种图片
        if: success()         # 只有脚本运行成功才会上传（防止上传空文件）
