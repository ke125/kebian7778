name: 扫描币安U本位合约

# 定时执行规则：
# 已调整为 北京时间每小时第5分钟自动执行一次
on:
  schedule:
    # 北京时间 00:05 ~ 07:05 → 对应 UTC 前一天 16:05 ~ 23:05
    - cron: '5 16-23 * * *'
    # 北京时间 08:05 ~ 23:05 → 对应 UTC 当天 00:05 ~ 08:05
    - cron: '5 0-8 * * *'
  # 保留手动触发，方便测试
  workflow_dispatch:

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      # 拉取代码（修复 Node.js 20 警告，使用最新兼容版本）
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # 设置 Python 环境
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 安装依赖库（按需添加你脚本需要的包，比如 python-binance）
      - name: 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas python-binance

      # 运行你的币安扫描脚本
      - name: 运行扫描脚本
        run: python scan_binance_4h_final.py
