name: 扫描币安U本位合约

# 定时执行规则：
# 采用 UTC 时间（比北京时间晚8小时）
# 每小时第5分钟自动执行一次
on:
  schedule:
    - cron: '5 * * * *'  # Runs at 5 minutes past the hour (UTC)
  workflow_dispatch:  # 允许手动触发

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas  # 按需添加其他依赖

      - name: 运行扫描脚本
        run: python scan_binance_4h_final.py
