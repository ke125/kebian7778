name: Scan Binance U本位 Perpetual
on:
  schedule:
    - cron: '5 16-23 * * *'
    - cron: '5 0-8 * * *'
  workflow_dispatch:

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas python-binance
      - name: Run scan script
        run: python scan_binance_4h_final.py
