name: Binance 4H Scan

on:
  schedule:
    - cron: "0 0,4,8,12,16,20 * * *"  # 每4小时整点执行（UTC时间，对应北京时间0/4/8/12/16/20点）
  workflow_dispatch:  # 允许手动触发测试

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install pandas mplfinance matplotlib requests

      - name: 运行扫描脚本
        run: python scan_binance_4h_final.py

      - name: 上传图表文件
        uses: actions/upload-artifact@v4
        with:
          name: match-charts
          path: match_*.png
